<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI for Business Chat Assistant</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #002855 0%, #004080 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #002855;
            color: white;
            padding: 24px;
            text-align: center;
            border-bottom: 3px solid #F2A900;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            color: #F2A900;
            font-weight: 500;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.bot .message-content {
            background: white;
            color: #002855;
            border: 1px solid #e0e0e0;
        }

        .message.user .message-content {
            background: #002855;
            color: white;
        }

        .message.bot .message-content a {
            color: #F2A900;
            font-weight: 600;
            text-decoration: underline;
        }

        .message.bot .message-content a:hover {
            color: #d99500;
        }

        .checkout-container {
            width: 100%;
            min-height: 350px;
            margin: 12px 0;
            border: 2px solid #F2A900;
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            width: fit-content;
            margin-bottom: 16px;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #002855;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #002855;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        #messageInput:focus {
            border-color: #F2A900;
        }

        #sendButton {
            padding: 12px 32px;
            background: #F2A900;
            color: #002855;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #sendButton:hover {
            background: #d99500;
            transform: translateY(-1px);
        }

        #sendButton:active {
            transform: translateY(0);
        }

        #sendButton:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI for Business Chat Assistant</h1>
            <p>Rollins College</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Hi! I'm the AI assistant for Rollins College's AI for Business club. I can help you with information about meetings, upcoming events, speakers, and ticket purchases for our fundraiser. What would you like to know?
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="messageInput"
                placeholder="Ask about events, speakers, or buy tickets..."
                autocomplete="off"
            >
            <button id="sendButton">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');

        let conversationHistory = [];
        let stripe = null;
        let activeCheckout = null;
        let activeCheckoutContainer = null;

        // Initialize Stripe on page load
        async function initStripe() {
            try {
                const response = await fetch('/api/config');
                const { stripePublishableKey } = await response.json();
                if (stripePublishableKey) {
                    stripe = Stripe(stripePublishableKey);
                }
            } catch (error) {
                console.error('Failed to initialize Stripe:', error);
            }
        }

        initStripe();

        // Handle hash-based return URL (works on page load AND hash changes from Google Pay / redirects)
        function handleCheckoutReturn() {
            if (!window.location.hash.startsWith('#/checkout-complete')) return;

            const params = new URLSearchParams(window.location.hash.split('?')[1]);
            const sessionId = params.get('session_id');
            window.location.hash = '';

            if (!sessionId) return;

            // Clean up any active checkout form
            if (activeCheckout) {
                try { activeCheckout.destroy(); } catch (e) {}
                activeCheckout = null;
            }
            if (activeCheckoutContainer) {
                activeCheckoutContainer.remove();
                activeCheckoutContainer = null;
            }

            // Verify payment and show success
            fetch(`/api/checkout-status?session_id=${encodeURIComponent(sessionId)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.paid) {
                        addMessage('Payment successful! Your tickets have been purchased. Check your email for confirmation details.', 'bot');
                    } else {
                        addMessage('Payment is still processing. Please check back shortly.', 'bot');
                    }
                })
                .catch(() => {
                    addMessage('Payment may have completed. Please check your email for confirmation.', 'bot');
                });
        }

        // Run on page load and on hash changes (Google Pay redirects via hash)
        handleCheckoutReturn();
        window.addEventListener('hashchange', handleCheckoutReturn);

        // Send message when button clicked
        sendButton.addEventListener('click', sendMessage);

        // Send message when Enter key pressed
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            sendButton.disabled = true;

            // Show typing indicator
            typingIndicator.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // Send to backend
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        conversationHistory: conversationHistory
                    })
                });

                const data = await response.json();

                // Hide typing indicator
                typingIndicator.classList.remove('active');

                // Add bot response
                if (data.message) {
                    addMessage(data.message, 'bot');

                    // Update conversation history
                    conversationHistory.push(
                        { role: 'user', content: message },
                        { role: 'assistant', content: data.message }
                    );
                }

                // If a payment session was returned, render embedded checkout
                if (data.paymentSession && data.paymentSession.clientSecret) {
                    renderEmbeddedCheckout(data.paymentSession.clientSecret);
                }

            } catch (error) {
                console.error('Error:', error);
                typingIndicator.classList.remove('active');
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        async function renderEmbeddedCheckout(clientSecret) {
            if (!stripe) {
                addMessage('Payment system is not available. Please try again later.', 'bot');
                return;
            }

            // Create a container div for the checkout form
            const container = document.createElement('div');
            container.className = 'checkout-container';
            container.id = 'checkout-container-' + Date.now();
            chatMessages.appendChild(container);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Track active checkout so hash handler can clean up
            activeCheckoutContainer = container;

            try {
                const checkout = await stripe.initEmbeddedCheckout({
                    clientSecret: clientSecret,
                });

                activeCheckout = checkout;
                checkout.mount('#' + container.id);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (error) {
                console.error('Error rendering checkout:', error);
                container.remove();
                activeCheckout = null;
                activeCheckoutContainer = null;
                addMessage('Sorry, there was an issue loading the payment form. Please try again.', 'bot');
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Convert URLs to clickable links, excluding trailing punctuation
            const urlRegex = /(https?:\/\/[^\s<)"']+?)([.,;:!?)\]]*(?:\s|$))/g;
            const htmlContent = text.replace(urlRegex, (match, url, punctuation) => {
                return `<a href="${url}" target="_blank">${url}</a>${punctuation}`;
            });

            contentDiv.innerHTML = htmlContent;

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);

            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
